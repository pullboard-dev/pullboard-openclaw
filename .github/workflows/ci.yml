name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  compiled-artifact:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22.14.0, 24.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install exactly the committed dependency graph
        run: npm ci
      - name: Test the exact compiled artifact
        run: npm test
