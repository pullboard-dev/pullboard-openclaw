name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  locked-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm
      - name: Install exactly the committed dependency graph
        run: npm ci
      - name: Build the shipped artifact
        run: npm run build
